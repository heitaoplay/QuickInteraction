    </filter>
    <radialGradient id="roseGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF5C7A" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#FF5C7A" stop-opacity="0"/>
